on:
    push:
      branches:
        - main
  
name: 🚀 Deploy website on push to main
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: composer install
      run: composer install --no-dev
      
